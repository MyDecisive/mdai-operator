version: "2"
run:
  allow-parallel-runners: true
  allow-serial-runners: true
  relative-path-mode: gomod
  modules-download-mode: readonly
linters:
  default: all
  disable:
    - cyclop
    - depguard
    - dupl
    - err113
    - funlen
    - gocognit
    - godoclint
    - godot
    - gochecknoglobals
    - godox
    - ireturn
    - lll
    - maintidx
    - nlreturn
    - noctx
    - noinlineerr
    - nolintlint
    - paralleltest
    - prealloc
    - tagalign
    - tagliatelle
    - testpackage
    - varnamelen
    - wrapcheck
    - wsl
    - wsl_v5

  settings:
    cyclop:
      max-complexity: 15
    funlen:
      lines: 85
    gocritic:
      enable-all: true
      disabled-checks:
        - hugeParam
        - unnamedResult
        - paramTypeCombine
        - rangeValCopy
        - whyNoLint
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow
    exhaustruct:
      include:
        - github.com/mydecisive/mdai-gateway/internal/
        - github.com/mydecisive/mdai-operator/internal/
    testifylint:
      enable-all: true
    revive:
      enable-all-rules: true
      rules:
        - name: comment-spacings
          disabled: true
        - name: add-constant
          exclude: [ "**/*_test.go" ]
          disabled: true
        - name: argument-limit
          disabled: true
        - name: blank-imports
        - name: cognitive-complexity
          exclude: [ "**/*_test.go" ]
          disabled: true
        - name: cyclomatic
          exclude: [ "**/*_test.go" ]
          disabled: true
        - name: dot-imports
          disabled: true
        - name: early-return
          arguments:
            - preserveScope
        - name: exported
          disabled: true
        - name: function-length
          exclude: [ "**/*_test.go" ]
          disabled: true
        - name: line-length-limit
          disabled: true
        - name: max-public-structs
          disabled: true
        - name: package-comments
          disabled: true
        - name: struct-tag
          disabled: true
        - name: superfluous-else
          arguments:
            - preserveScope
        - name: unchecked-type-assertion
          disabled: true
        - name: unused-parameter
          disabled: true
        - name: var-naming
          disabled: true
    tagliatelle:
      case:
        rules:
          json: camel
          yaml: camel
          xml: camel
          toml: camel
          bson: camel
          avro: snake
          mapstructure: kebab
          env: upperSnake
          envconfig: upperSnake
    unparam:
      check-exported: true
    unused:
      exported-fields-are-used: false
    forbidigo:
      analyze-types: true
      exclude-godoc-examples: false
      forbid:
        - pattern: ^print(ln)?$
          msg: do not commit print statements
        - pattern: ^fmt\.Print.*$
          msg: Do not commit print statements.
        - pattern: log.Fatal
          msg: use zap instead
        - pattern: ^os.Exit$
          msg: return errors and exit from main()
        - pattern: zap.Any
          msg: define a MarshalLogObject
    depguard:
      rules:
        main:
          list-mode: lax
          deny:
            - pkg: "math/rand$"
              desc: use math/rand/v2
            - pkg: "github.com/sirupsen/logrus"
              desc: use zap
            - pkg: "github.com/pkg/errors"
              desc: should be replaced by standard lib errors package
            - pkg: "io/ioutil"
              desc: deprecated
  exclusions:
    generated: lax
    rules:
      - path: ^cmd\/main\.go$
        linters:
          - forbidigo
      - path: _test\.go
        linters:
          - cyclop
          - dupl
          - funlen
          - gosec
          - maintidx
          - unparam
      - path: ^test\/
        linters:
          - gosec
          - mnd
      - linters:
          - lll
        path: internal/*
formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  settings:
    gofumpt:
      extra-rules: false
    gofmt:
      simplify: true
      rewrite-rules:
        - pattern: 'interface{}'
          replacement: 'any'
        - pattern: 'a[b:len(a)]'
          replacement: 'a[b:]'
    gci:
      sections:
        - standard
        - default
        - blank
        - dot
        - alias
        - localmodule
      no-inline-comments: false
      no-prefix-comments: false
      custom-order: false
      no-lex-order: false
